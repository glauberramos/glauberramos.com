<!doctype html>
<html class="no-js" lang="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inspirational Quotes</title>
    <meta name="description" content="Inspirational Quotes" />
  </head>

  <body>
    <div class="quote">
      <div class="quote-text">
        <div class="quote-body">
          <span class="quote-mark" aria-hidden="true">“</span
          ><span id="quote-text"
            >Listening to and understanding our inner sufferings will resolve
            most of the problems we encounter.</span
          ><span class="quote-mark-end" aria-hidden="true">”</span>
        </div>
      </div>
      <div class="author">
        <div class="author-name" id="author-name">Thich Nhat Hanh</div>
      </div>
      <div class="actions">
        <button type="button" id="new-quote" class="new-quote-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-3-6.7" />
            <polyline points="21 4 21 10 15 10" />
          </svg>
          New quote
        </button>
      </div>
    </div>
  </body>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background-color: rgb(18, 22, 32);
      color: #e8eaf0;
      font-size: 18px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
      box-sizing: border-box;
    }

    .quote {
      background-color: rgb(32, 38, 52);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      width: 36em;
      max-width: 100%;
      box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.6),
        0 8px 20px -10px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .quote-text {
      padding: 2.5em 2.5em 1em;
    }

    .quote-body {
      color: #e8eaf0;
      font-size: 1.15em;
      font-weight: 400;
      line-height: 1.55;
      white-space: pre-line;
    }

    .quote-mark,
    .quote-mark-end {
      color: rgba(255, 255, 255, 0.25);
      font-size: 1.1em;
      font-weight: 700;
    }

    .author {
      display: flex;
      align-items: center;
      padding: 0.5em 2.5em 1.5em;
    }

    .author-name {
      color: rgba(232, 234, 240, 0.55);
      font-size: 0.95em;
      font-weight: 600;
      letter-spacing: 0.02em;
      position: relative;
      padding-left: 2.2em;
    }

    .author-name::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 1.6em;
      height: 1px;
      background-color: rgba(232, 234, 240, 0.3);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      padding: 1em 1.5em 1.5em;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      margin-top: 0.5em;
    }

    .new-quote-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      background-color: rgba(255, 255, 255, 0.06);
      color: #e8eaf0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.55em 1em;
      font: inherit;
      font-size: 0.9em;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 120ms ease, border-color 120ms ease,
        transform 120ms ease;
    }

    .new-quote-btn:hover {
      background-color: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .new-quote-btn:active {
      transform: scale(0.98);
    }

    .new-quote-btn:focus-visible {
      outline: 2px solid rgba(120, 160, 255, 0.6);
      outline-offset: 2px;
    }
  </style>
  <script>
    var quotes = [
      {
        text: "Be curious, read widely, try new things. I think a lot of what people call intelligence boils down to curiosity",
        author: "Aaron Swartz",
      },
      {
        text: "The meaning of life is just to be alive. It is so plain and so obvious and so simple. And yet, everybody rushes around in a great panic as if it were necessary to achieve something beyond themselves",
        author: "Alan Watts",
      },
      {
        text: "Society grows great when old men plant trees whose shade they know they shall never sit in",
        author: "Anonymous Greek Proverb",
      },
      {
        text: "Frodo: I wish the Ring had never come to me. I wish none of this had happened. Gandalf: So do all who live to see such times, but that is not for them to decide. All we have to decide is what to do with the time that is given to us.",
        author: "J.R.R. Tolkien",
      },
      {
        text: "People say I'm the Beatle who changed the most, but to me, that's what life's about",
        author: "George Harrison",
      },
      {
        text: "When you don't create things, you become defined by your tastes rather than ability. Your tastes only narrow & exclude people. So, create",
        author: "Why The Lucky Stiff",
      },
      {
        text: "Nothing is original. Steal from anywhere that resonates with inspiration or fuels your imagination. Devour old films, new films, music, books, paintings, photographs, poems, dreams, random conversations, architecture, bridges, street signs, trees, clouds, bodies of water, light and shadows. Select only things to steal from that speak directly to your soul. If you do this, your work (and theft) will be authentic. Authenticity is invaluable; originality is nonexistent. And don’t bother concealing your thievery. celebrate it if you feel like it. In any case, always remember what Jean-Luc Godard said: “It’s not where you take things from – it’s where you take them to",
        author: "Jim Jarmusch",
      },
      {
        text: "This is your life. Do what you love, and do it often. If you don't like something, change it. If you don't like your job, quit. If you don't have enough time, stop watching TV. If you are looking for the love of your life, stop; They will be waiting for you when you start doing things you love. Stop over analyzing, life is simple.All emotions are beautiful. When you eat, appreciate every last bite.  Open your mind, arms, and heart to new things and people, we are united in our differences. Ask the next person you see what their passion is, and share your inspiring dream with them. Travel often; Getting lost will help you find yourself. Some opportunities come only once, seize them. Life is about the people you meet, and the things you create with them, so go out and start creating. Life is short. Live your dream and share your passion",
        author: "The Holstee Manifesto",
      },
      {
        text: "Um homem precisa viajar. Por sua conta, não por meio de histórias, imagens, livros ou TV. Precisa viajar por si, com seus olhos e pés, para entender o que é seu. Para um dia plantar as suas próprias árvores e dar-lhes valor. Conhecer o frio para desfrutar do calor. E o oposto. Sentir a distância e o desabrigo para estar bem sob o próprio teto. Um homem precisa viajar para lugares que não conhece para quebrar essa arrogância que nos faz ver o mundo como o imaginamos, e não simplesmente como é ou pode ser; que nos faz professores e doutores do que não vimos, quando deveríamos ser alunos, e simplesmente ir ver",
        author: "Amyr Klink",
      },
      {
        text: "Inventamos una montaña de consumo superfluo, que hay que tirar y seguir comprando y tirando y lo que estamos gastando es tiempo de vida; porque cuando yo compro algo o tuno lo compras con plata, lo compras con el tiempo de vida que tuviste en libertad para tener esa plata. Pero con esta diferencia, la única cosa que no se puede comprar es la vida... la vida se gasta y es miserable gastar la vida para perder libertad",
        author: "José Mujica",
      },
      {
        text: "Your time is limited, so don’t waste it living someone else’s life. Don’t be trapped by dogma – which is living with the results of other people’s thinking. Don’t let the noise of other’s opinions drown out your own inner voice. And most important, have the courage to follow your heart and intuition. They somehow already know what you truly want to become. Everything else is secondary",
        author: "Steve Jobs",
      },
      {
        text: "You can’t connect the dots looking forward; you can only connect them looking backwards. So you have to trust that the dots will somehow connect in your future. You have to trust in something — your gut, destiny, life, karma, whatever. Because believing that the dots will connect down the road will give you the confidence to follow your heart even when it leads you off the well worn path; and that will make all the difference.",
        author: "Steve Jobs",
      },
      {
        text: "Twenty years from now you will be more disappointed by the things that you didn’t do than by the ones you did do. So throw off the bowlines. Sail away from the safe harbor. Catch the trade winds in your sails. Explore. Dream. Discover",
        author: "Mark Twain",
      },
      {
        text: "Look deep into nature, and then you will understand everything better",
        author: "Albert Einstein",
      },
      {
        text: "The world is a book and those who do not travel read only one page",
        author: "St. Augustine",
      },
      {
        text: "Don’t cry because it’s over, smile because it happened",
        author: "Dr. Seuss",
      },
      {
        text: "Time is the most important asset. Time does not equal money. Time equals life. And you only have one chance to make it right. Every human being is fighting a battle inside themselves. It’s your obligation to help and inspire them. Regardless of what you do, you can always inspire others to do good. Nobody is better than you. And you’re not better than anybody else. Be humble. Being in the comfort zone is wonderful, but nothing ever grows there. Keep studying. Keep creating. Haters will come if you have the audacity to build something new. Don’t let them define you. Don’t let them stop you. Just block them and keep going. Don’t expect others to make you happy. You are the only one responsible for your happiness. Don’t wait until friday to enjoy life. Joy should be present in everything you do. Be kind to your parents. They gave up many things for you. Having hundreds of people admiring you is worthless, if you’re not admired by your own family. Don’t fear the unknown. Fear knowing everything. Life is too damn short and every day counts. Do what you wanna do and do it now. Tick-tock don't stop. Tick-tock don't wait",
        author: "Zeno Rocha & Carol Moreschi",
      },
      {
        text: "We buy things we don't need with money we don't have to impress people we don't like.",
        author: "Chuck Palahniuk - Fight Club",
      },
    ];

    const quoteEl = document.getElementById("quote-text");
    const authorEl = document.getElementById("author-name");
    let lastIndex = -1;

    function showRandomQuote() {
      let index = Math.floor(Math.random() * quotes.length);
      if (quotes.length > 1 && index === lastIndex) {
        index = (index + 1) % quotes.length;
      }
      lastIndex = index;
      quoteEl.textContent = quotes[index].text;
      authorEl.textContent = quotes[index].author;
    }

    showRandomQuote();
    document
      .getElementById("new-quote")
      .addEventListener("click", showRandomQuote);
  </script>
</html>
